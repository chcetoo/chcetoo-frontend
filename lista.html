<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chcetoo.pl - Lista Marzeń</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased min-h-screen flex flex-col items-center">

    <main class="w-full max-w-6xl bg-white min-h-screen shadow-2xl flex flex-col justify-between">
        
        <div>
            <div class="w-full bg-white px-6 py-4 border-b border-slate-100 flex items-center justify-between">
                <h1 class="text-2xl font-black tracking-tight text-orange-500">
                    <a href="index.html">chce<span class="text-slate-900">too.pl</span></a>
                </h1>
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest hidden sm:inline">Twój asystent prezentowy</span>
            </div>

            <div class="p-6 md:px-12 md:pt-8 md:pb-2 grid grid-cols-1 md:grid-cols-3 gap-4 shrink-0">
                <div class="relative">
                    <input type="text" id="search-input" oninput="filterAndRenderGifts()" placeholder="Szukaj prezentu..." class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-orange-500 text-sm font-medium shadow-sm">
                </div>
                <div>
                    <select id="status-filter" onchange="filterAndRenderGifts()" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-orange-500 text-sm font-medium shadow-sm cursor-pointer">
                        <option value="all">Wszystkie prezenty</option>
                        <option value="available">Dostępne</option>
                        <option value="reserved">Zarezerwowane</option>
                    </select>
                </div>
                <div>
                    <select id="sort-filter" onchange="filterAndRenderGifts()" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-orange-500 text-sm font-medium shadow-sm cursor-pointer">
                        <option value="default">Sortowanie domyślne</option>
                        <option value="price-asc">Cena: od najniższej</option>
                        <option value="price-desc">Cena: od najwyższej</option>
                        <option value="rating-desc">Priorytet: od najważniejszych</option>
                    </select>
                </div>
            </div>

            <div id="loader" class="text-center py-24">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-orange-500 mx-auto mb-4"></div>
                <p class="text-slate-500 font-bold uppercase tracking-wider text-xs">Pobieranie listy marzeń...</p>
            </div>

            <div id="gifts-container" class="p-6 md:p-12 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 hidden">
                </div>
        </div>

        <footer class="bg-slate-900 text-slate-400 py-6 px-6 text-center md:flex md:justify-between md:items-center text-xs border-t border-slate-800 shrink-0 mt-auto">
            <p class="font-semibold uppercase tracking-widest text-[10px] text-slate-500">© 2026 chcetoo.pl. Wszelkie prawa zastrzeżone.</p>
            <div class="space-x-4 mt-2 md:mt-0 font-medium">
                <a href="#" class="hover:text-white transition-colors">Regulamin</a>
                <a href="#" class="hover:text-white transition-colors">Polityka Prywatności</a>
                <a href="#" class="hover:text-white transition-colors">Kontakt</a>
            </div>
        </footer>

    </main>

    <div id="reservation-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center hidden z-50">
        <div class="bg-white p-6 md:p-8 rounded-2xl shadow-2xl max-w-md w-full mx-4 border border-slate-100">
            <div class="text-center mb-6">
                <div class="w-12 h-12 bg-orange-50 text-orange-500 rounded-full flex items-center justify-center mx-auto mb-3 text-xl shadow-inner">🎁</div>
                <h3 class="text-xl font-black text-slate-900 tracking-tight">Rezerwujesz prezent</h3>
                <p id="modal-gift-title" class="text-sm font-bold text-orange-500 mt-1 px-2 line-clamp-2"></p>
            </div>
            
            <form id="reservation-form" onsubmit="submitReservation(event)" class="space-y-4">
                <input type="hidden" id="modal-gift-id">
                
                <div>
                    <label class="block text-xs font-black text-slate-500 uppercase tracking-wider mb-1">Twoje imię / ksywka</label>
                    <input type="text" id="guest-name" required placeholder="Napisz jak się nazywasz..." class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-orange-500 text-sm shadow-sm font-medium">
                </div>
                
                <div>
                    <label class="block text-xs font-black text-slate-500 uppercase tracking-wider mb-1">Twój adres e-mail</label>
                    <input type="email" id="guest-email" required placeholder="Twój adres e-mail..." class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-orange-500 text-sm shadow-sm font-medium">
                    <p class="text-[10px] text-slate-400 mt-1 font-medium">Adres posłuży wyłącznie do przesłania linku oraz potwierdzenia zakupu.</p>
                </div>
                
                <div class="flex space-x-3 pt-2">
                    <button type="button" onclick="closeModal()" class="w-1/2 py-3.5 text-xs font-bold text-slate-500 bg-slate-100 hover:bg-slate-200 rounded-xl transition-all uppercase tracking-wider">Anuluj</button>
                    <button type="submit" class="w-1/2 py-3.5 text-xs font-black text-white bg-orange-500 hover:bg-orange-600 rounded-xl transition-all shadow-lg shadow-orange-500/20 uppercase tracking-wider">Rezerwuję</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://lytnirtzfmbhctmtdykk.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5dG5pcnR6Zm1iaGN0bXRkeWtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MTQ1ODAsImV4cCI6MjA5NTM5MDU4MH0.wSnKSi-XHmS5uVsaqdlzI7TMDmHawqkVRQv9Tvv-wY8';

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let allGifts = []; 
        let currentGiftId = null;

        document.addEventListener('DOMContentLoaded', fetchGifts);

        async function fetchGifts() {
            try {
                const { data: gifts, error } = await supabaseClient
                    .from('gifts')
                    .select('*');

                if (error) throw error;
                
                allGifts = gifts;
                filterAndRenderGifts(); 
            } catch (error) {
                console.error('Błąd podczas pobierania danych:', error);
                alert('Nie udało się załadować listy prezentów.');
            } finally {
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('gifts-container').classList.remove('hidden');
            }
        }

        // Funkcja pomocnicza do dynamicznego pobierania wartości pól na podstawie dostępnych kluczy w bazie
        function getGiftValue(gift, keysArray) {
            for (let key of keysArray) {
                if (gift && key in gift && gift[key] !== undefined && gift[key] !== null) {
                    return gift[key];
                }
            }
            return null;
        }

        function filterAndRenderGifts() {
            const searchQuery = document.getElementById('search-input').value.toLowerCase().trim();
            const statusFilter = document.getElementById('status-filter').value;
            const sortFilter = document.getElementById('sort-filter').value;

            let filteredGifts = allGifts.filter(gift => {
                const title = String(getGiftValue(gift, ['title', 'gift_title', 'nazwa']) || '').toLowerCase();
                const description = String(getGiftValue(gift, ['description', 'gift_description', 'opis']) || '').toLowerCase();
                const matchesSearch = title.includes(searchQuery) || description.includes(searchQuery);

                const reservedName = getGiftValue(gift, ['reserved_by_name', 'gift_reserved_by_name', 'reserved_by']);
                const isReserved = !!reservedName;
                
                let matchesStatus = true;
                if (statusFilter === 'available') matchesStatus = !isReserved;
                if (statusFilter === 'reserved') matchesStatus = isReserved;

                return matchesSearch && matchesStatus;
            });

            // Pobieranie ceny do sortowania
            const getPriceNum = (gift) => {
                let p = getGiftValue(gift, ['price', 'gift_price', 'cena']) ?? 0;
                if (typeof p === 'string') p = p.replace(',', '.').replace(/[^\d.]/g, '');
                return parseFloat(p) || 0;
            };

            // Sortowanie
            if (sortFilter === 'price-asc') {
                filteredGifts.sort((a, b) => getPriceNum(a) - getPriceNum(b));
            } else if (sortFilter === 'price-desc') {
                filteredGifts.sort((a, b) => getPriceNum(b) - getPriceNum(a));
            } else if (sortFilter === 'rating-desc') {
                const getRating = (g) => parseInt(getGiftValue(g, ['rating', 'gift_rating', 'priorytet'])) || 5;
                filteredGifts.sort((a, b) => getRating(b) - getRating(a));
            }

            renderGifts(filteredGifts);
        }

        function generateStarsHtml(rating) {
            const maxStars = 5;
            const currentRating = Math.min(Math.max(parseInt(rating) || 5, 1), maxStars);
            let starsHtml = '<div class="flex items-center space-x-0.5">';
            for (let i = 1; i <= maxStars; i++) {
                starsHtml += `
                    <svg class="w-4 h-4 ${i <= currentRating ? 'text-amber-400' : 'text-slate-200'}" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path>
                    </svg>
                `;
            }
            starsHtml += '</div>';
            return starsHtml;
        }

        function renderGifts(gifts) {
            const container = document.getElementById('gifts-container');
            container.innerHTML = ''; 

            if (gifts.length === 0) {
                container.innerHTML = '<p class="text-center text-slate-500 col-span-full py-12 font-medium">Brak prezentów spełniających kryteria.</p>';
                return;
            }

            gifts.forEach(gift => {
                // Wyciąganie wartości z automatycznym dopasowaniem pól
                const title = getGiftValue(gift, ['title', 'gift_title', 'nazwa']) || 'Prezent';
                const description = getGiftValue(gift, ['description', 'gift_description', 'opis']) || 'Brak dodatkowego opisu.';
                const link = getGiftValue(gift, ['link', 'gift_link', 'site_url', 'url']) || '#';
                const rating = getGiftValue(gift, ['rating', 'gift_rating', 'priorytet']) || 5;
                const id = getGiftValue(gift, ['id', 'gift_id', 'ID']);
                
                const reservedName = getGiftValue(gift, ['reserved_by_name', 'gift_reserved_by_name', 'reserved_by']);
                const isReserved = !!reservedName;
                
                // Parsowanie ceny
                let rawPrice = getGiftValue(gift, ['price', 'gift_price', 'cena']);
                let priceDisplay = 'Brak ceny';
                if (rawPrice !== undefined && rawPrice !== null && rawPrice !== '') {
                    if (typeof rawPrice === 'string') {
                        rawPrice = rawPrice.replace(',', '.').replace(/[^\d.]/g, '');
                    }
                    const parsedPrice = parseFloat(rawPrice);
                    if (!isNaN(parsedPrice)) priceDisplay = `${parsedPrice.toFixed(2)} PLN`;
                }

                // Pobieranie linku do zdjęcia
                let rawImage = getGiftValue(gift, ['image_url', 'gift_image_url', 'image', 'gift_image', 'zdjecie', 'foto']);
                let imageUrl = 'https://images.unsplash.com/photo-1549465220-1a8b9238cd48?auto=format&fit=crop&w=500&q=80';
                if (rawImage && typeof rawImage === 'string' && rawImage.trim() !== '') {
                    imageUrl = rawImage.trim();
                }

                const card = document.createElement('div');
                card.className = `bg-white rounded-2xl border flex flex-col overflow-hidden shadow-sm transition-all duration-300 ${
                    isReserved ? 'border-slate-200 opacity-60' : 'border-slate-100 hover:border-slate-200 hover:shadow-xl hover:-translate-y-1'
                }`;

                card.innerHTML = `
                    <div class="relative h-48 bg-slate-50 overflow-hidden shrink-0 flex items-center justify-center">
                        <img src="${imageUrl}" alt="${title}" class="w-full h-full object-cover" onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1549465220-1a8b9238cd48?auto=format&fit=crop&w=500&q=80';">
                        <div class="absolute top-3 right-3">
                            <span class="px-2.5 py-1 text-[10px] font-black uppercase tracking-wider rounded-md shadow-sm ${
                                isReserved ? 'bg-slate-800 text-white' : 'bg-emerald-500 text-white'
                            }">
                                ${isReserved ? 'Zarezerwowany' : 'Dostępny'}
                            </span>
                        </div>
                    </div>

                    <div class="p-5 flex flex-col justify-between flex-grow space-y-4">
                        <div class="space-y-2">
                            <div class="flex items-center justify-between">
                                ${generateStarsHtml(rating)}
                                <span class="text-xs font-black text-slate-900 bg-slate-100 px-2 py-0.5 rounded-md">${priceDisplay}</span>
                            </div>
                            <h2 class="text-base font-black text-slate-900 tracking-tight leading-snug line-clamp-2">${title}</h2>
                            <p class="text-slate-500 text-xs font-medium leading-relaxed line-clamp-3">${description}</p>
                        </div>
                        
                        <div class="pt-2 flex flex-col gap-2">
                            ${link !== '#' && !isReserved ? `<a href="${link}" target="_blank" class="text-center text-[11px] font-bold text-orange-500 hover:text-orange-600 transition-colors py-1">Zobacz w sklepie &rarr;</a>` : ''}
                            
                            ${isReserved 
                                ? `<button disabled class="w-full py-3 bg-slate-100 text-slate-400 text-xs font-black rounded-xl uppercase tracking-wider cursor-not-allowed">Prezent zarezerwowany</button>`
                                : `<button onclick="openModal(${id}, '${title.replace(/'/g, "\\'")}')" class="w-full bg-orange-500 hover:bg-orange-600 text-white text-xs font-black py-3 rounded-xl transition-all shadow-md shadow-orange-500/10 uppercase tracking-wider cursor-pointer text-center">Chcę to podarować</button>`
                            }
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function openModal(id, title) {
            currentGiftId = id;
            document.getElementById('modal-gift-title').innerText = title;
            document.getElementById('reservation-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('reservation-modal').classList.add('hidden');
            document.getElementById('reservation-form').reset();
            currentGiftId = null;
        }

        async function submitReservation(event) {
            event.preventDefault();
            const guestName = document.getElementById('guest-name').value.trim();
            const guestEmail = document.getElementById('guest-email').value.trim();

            if (!currentGiftId || allGifts.length === 0) return;

            // Wykrywanie jakich kolumn rezerwacyjnych używa pierwszy rekord
            const firstGift = allGifts[0];
            const idKey = 'id' in firstGift ? 'id' : 'gift_id';
            const resNameKey = 'reserved_by_name' in firstGift ? 'reserved_by_name' : 'gift_reserved_by_name';
            const resEmailKey = 'reserved_by_email' in firstGift ? 'reserved_by_email' : 'gift_reserved_by_email';
            const resAtKey = 'reserved_at' in firstGift ? 'reserved_at' : 'gift_reserved_at';

            try {
                const updateData = {};
                updateData[resNameKey] = guestName;
                updateData[resEmailKey] = guestEmail;
                updateData[resAtKey] = new Date().toISOString();

                const { error } = await supabaseClient
                    .from('gifts')
                    .update(updateData)
                    .eq(idKey, currentGiftId);

                if (error) throw error;

                closeModal();
                window.location.href = `przekierowanie.html?gift_id=${currentGiftId}&name=${encodeURIComponent(guestName)}&email=${encodeURIComponent(guestEmail)}`;
            } catch (error) {
                console.error('Błąd rezerwacji:', error);
                alert('Wystąpił problem z rezerwacją.');
            }
        }
    </script>
</body>
</html>
