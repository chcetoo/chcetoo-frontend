<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chcetoo.pl - Lista Marzeń</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-900 min-h-screen pb-12">

    <!-- NAGŁÓWEK STRONY -->
    <header class="bg-white shadow-sm py-6 mb-8">
        <div class="max-w-4xl mx-auto px-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-indigo-600">chcetoo.pl</h1>
            <p class="text-gray-500 text-sm">Lista prezentów</p>
        </div>
    </header>

    <!-- KONTENER GŁÓWNY -->
    <main class="max-w-4xl mx-auto px-4">
        
        <!-- LOADER (Ekran ładowania) -->
        <div id="loader" class="text-center py-12">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mx-auto mb-4"></div>
            <p class="text-gray-600 font-medium">Ładowanie listy marzeń...</p>
        </div>

        <!-- SIATKA Z PREZENTAMI (Początkowo ukryta) -->
        <div id="gifts-container" class="grid grid-cols-1 md:grid-cols-2 gap-6 hidden">
            <!-- Tutaj JavaScript wstrzyknie karty prezentów -->
        </div>
    </main>

    <!-- MODAL REZERWACJI (Okienko popup) -->
    <div id="reservation-modal" class="fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center hidden z-50">
        <div class="bg-white p-6 rounded-xl shadow-xl max-w-md w-full mx-4">
            <h3 class="text-lg font-bold text-gray-900 mb-2">Rezerwujesz prezent</h3>
            <p id="modal-gift-title" class="text-indigo-600 font-semibold mb-4"></p>
            
            <form id="reservation-form" onsubmit="submitReservation(event)">
                <input type="hidden" id="modal-gift-id">
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Twoje imię / ksywka</label>
                    <input type="text" id="guest-name" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                </div>
                
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Twój adres e-mail</label>
                    <input type="email" id="guest-email" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                    <p class="text-xs text-gray-400 mt-1">E-mail potrzebny jest wyłącznie do wysłania potwierdzenia.</p>
                </div>
                
                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-lg transition">Anuluj</button>
                    <button type="submit" class="px-4 py-2 text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg transition font-medium">Potwierdzam rezerwację</button>
                </div>
            </form>
        </div>
    </div>

    <!-- LOGIKA JAVASCRIPT -->
    <script>
        // ====================================================================
        // 1. KONFIGURACJA SUPABASE
        // ====================================================================
        // UWAGA: Wklej tutaj swoje poprawne dane dostępowe z panelu Supabase!
        const SUPABASE_URL = 'https://lytnirtzfmbhctmtdykk.supabase.co/rest/v1/'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5dG5pcnR6Zm1iaGN0bXRkeWtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MTQ1ODAsImV4cCI6MjA5NTM5MDU4MH0.wSnKSi-XHmS5uVsaqdlzI7TMDmHawqkVRQv9Tvv-wY8';

        // Bezpieczna inicjalizacja klienta pod unikalną nazwą zmiennej
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentGiftId = null;

        // Uruchomienie pobierania danych po załadowaniu struktury HTML
        document.addEventListener('DOMContentLoaded', fetchGifts);

        // ====================================================================
        // 2. POBIERANIE PREZENTÓW Z BAZY DATA
        // ====================================================================
        async function fetchGifts() {
            try {
                // Łączymy się z tabelą 'Prezenty' zgodnie z konfiguracją w Supabase
                const { data: gifts, error } = await supabaseClient
                    .from('Prezenty')
                    .select('*')
                    .order('id', { ascending: true });

                if (error) throw error;

                renderGifts(gifts);
            } catch (error) {
                console.error('Błąd podczas pobierania danych:', error);
                alert('Nie udało się załadować listy prezentów. Sprawdź konfigurację połączenia w kodzie.');
            } finally {
                // Schowaj loader i pokaż zawartość strony
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('gifts-container').classList.remove('hidden');
            }
        }

        // ====================================================================
        // 3. RENDEROWANIE KART W HTML (ZGODNIE Z TWOIMI KOLUMNAMI)
        // ====================================================================
        function renderGifts(gifts) {
            const container = document.getElementById('gifts-container');
            container.innerHTML = ''; 

            if (gifts.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 col-span-2">Lista prezentów jest obecnie pusta.</p>';
                return;
            }

            gifts.forEach(gift => {
                // Wyciągamy dane stosując elastyczne mapowanie (na wypadek miksu nazw angielskich/polskich)
                const title = gift.gift_title || gift.title || 'Prezent';
                const description = gift.gift_description || gift.description || 'Brak opisu.';
                const link = gift.gift_link || gift.link || '';
                
                // Prezent jest uznawany za zarezerwowany, jeśli pole e-mail lub nazwa rezerwującego nie jest puste
                const isReserved = !!(gift.gift_reserved_by_email || gift.reserved_by_email || gift.is_reserved);
                
                const card = document.createElement('div');
                card.className = `bg-white p-6 rounded-xl shadow-sm border transition flex flex-col justify-between ${isReserved ? 'border-gray-200 opacity-60' : 'border-indigo-100 hover:border-indigo-300'}`;

                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-2">
                            <h2 class="text-lg font-bold text-gray-900">${title}</h2>
                            <span class="px-2 py-1 text-xs font-semibold rounded-full ${isReserved ? 'bg-gray-100 text-gray-600' : 'bg-green-100 text-green-800'}">
                                ${isReserved ? 'Zarezerwowany' : 'Dostępny'}
                            </span>
                        </div>
                        <p class="text-gray-600 text-sm mb-4">${description}</p>
                        ${link ? `<a href="${link}" target="_blank" class="text-indigo-500 hover:text-indigo-600 text-sm inline-flex items-center font-medium mb-4">Zobacz w sklepie &rarr;</a>` : ''}
                    </div>
                    
                    <div>
                        ${isReserved 
                            ? `<button disabled class="w-full py-2 bg-gray-100 text-gray-400 font-medium rounded-lg cursor-not-allowed">Prezent już zarezerwowany</button>`
                            : `<button onclick="openModal(${gift.id}, '${title.replace(/'/g, "\\'")}')" class="w-full py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg transition shadow-sm">Chcę to podarować</button>`
                        }
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // ====================================================================
        // 4. OBSŁUGA OKIENKA MODAL
        // ====================================================================
        function openModal(id, title) {
            currentGiftId = id;
            document.getElementById('modal-gift-title').innerText = title;
            document.getElementById('reservation-modal').classList.remove('hidden');
        }

        // Zamknięcie okna i reset pól formularza
        function closeModal() {
            document.getElementById('reservation-modal').classList.add('hidden');
            document.getElementById('reservation-form').reset();
            currentGiftId = null;
        }

        // ====================================================================
        // 5. ZAPIS REZERWACJI I URUCHOMIENIE WEBHOOKA DLA N8N
        // ====================================================================
        async function submitReservation(event) {
            event.preventDefault();

            const guestName = document.getElementById('guest-name').value;
            const guestEmail = document.getElementById('guest-email').value;

            if (!currentGiftId) return;

            try {
                // Aktualizujemy rekord w tabeli 'Prezenty'. 
                // Zmiana tych pól automatycznie odpali stworzony przez Ciebie Webhook do n8n!
                const { error } = await supabaseClient
                    .from('Prezenty')
                    .update({
                        gift_reserved_by_name: guestName,
                        gift_reserved_by_email: guestEmail,
                        is_reserved: true // flaga pomocnicza, jeśli występuje w bazie
                    })
                    .eq('id', currentGiftId);

                if (error) throw error;

                alert('Dziękujemy! Prezent został pomyślnie zarezerwowany.');
                closeModal();
                
                // Przeładowanie widoku komponentów w celu zaktualizowania statusu przycisków
                document.getElementById('loader').classList.remove('hidden');
                document.getElementById('gifts-container').classList.add('hidden');
                fetchGifts();

            } catch (error) {
                console.error('Błąd podczas próby zapisu rezerwacji:', error);
                alert('Wystąpił problem podczas rezerwacji. Spróbuj ponownie.');
            }
        }
    </script>
</body>
</html>
